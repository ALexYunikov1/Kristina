<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Для Кристины</title><style>html,body{margin:0;overflow:hidden;background:#000010}canvas{position:fixed}#name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font:bold 80px Arial;color:#fff;opacity:0;text-shadow:0 0 15px #fff,0 0 40px #6cf;animation:sh 5s forwards 6s}@keyframes sh{from{opacity:0;transform:translate(-50%,-50%) scale(.6)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}</style></head><body><canvas id='sky'></canvas><div id='name'>Кристина</div><script>const c=document.getElementById('sky'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;let a=[];for(let i=0;i<500;i++)a.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2,v:.2+Math.random()*1.5,o:Math.random()});(function f(){x.fillStyle='#000010';x.fillRect(0,0,c.width,c.height);for(let t of a){x.globalAlpha=t.o;x.beginPath();x.arc(t.x,t.y,t.s,0,6.28);x.fillStyle='white';x.fill();t.y+=t.v;if(t.y>c.height){t.y=0;t.x=Math.random()*c.width}}x.globalAlpha=1;requestAnimationFrame(f)})();</script></body></html>
